{{- if and (eq (include "nico-api.webAuth.renderBasicSecret" .) "true") (eq (include "nico-api.webAuth.hasExistingBasicSecret" .) "false") }}
{{- $secretName := include "nico-api.webAuth.basicSecretName" . }}
{{- $secretKey := include "nico-api.webAuth.basicSecretKey" . }}
{{- $password := randAlphaNum 32 | b64enc }}
{{- $existing := lookup "v1" "Secret" (include "nico-api.namespace" .) $secretName }}
{{- if and $existing $existing.data (hasKey $existing.data $secretKey) }}
{{- $password = index $existing.data $secretKey }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ include "nico-api.namespace" . }}
  labels:
    {{- include "nico-api.labels" . | nindent 4 }}
type: Opaque
data:
  {{ $secretKey }}: {{ $password | quote }}
{{- end }}
