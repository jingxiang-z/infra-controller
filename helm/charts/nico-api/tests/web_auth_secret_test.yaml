suite: WebUI Basic authentication Secret
templates:
  - web-basic-auth-secret.yaml
tests:
  - it: generates a 32-character password in the default mode
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: nico-api-web-basic-auth
      - matchRegex:
          path: data.password
          pattern: '^[A-Za-z0-9+/]{42}[A-Za-z0-9+/=]{2}$'

  - it: generates the default Secret with a custom key
    set:
      webAuth.basic.existingSecret.key: credential
    asserts:
      - equal:
          path: metadata.name
          value: nico-api-web-basic-auth
      - matchRegex:
          path: data.credential
          pattern: '^[A-Za-z0-9+/]{42}[A-Za-z0-9+/=]{2}$'
      - notExists:
          path: data.password

  - it: does not generate a Secret when an existing one is configured
    set:
      webAuth.basic.existingSecret.name: operator-web-password
    asserts:
      - hasDocuments:
          count: 0

  - it: does not generate a Secret for oauth2
    set:
      webAuth.mode: oauth2
    asserts:
      - hasDocuments:
          count: 0

  - it: does not generate a Secret for none
    set:
      webAuth.mode: none
    asserts:
      - hasDocuments:
          count: 0

  - it: does not generate a Secret for a literal legacy oauth2 override
    set:
      extraEnv:
        - name: CARBIDE_WEB_AUTH_TYPE
          value: oauth2
    asserts:
      - hasDocuments:
          count: 0

  - it: literal legacy mode takes precedence over an invalid configured mode
    set:
      webAuth.mode: saml
      extraEnv:
        - name: CARBIDE_WEB_AUTH_TYPE
          value: oauth2
    asserts:
      - hasDocuments:
          count: 0

  - it: conservatively generates a Secret for a valueFrom mode override
    set:
      extraEnv:
        - name: CARBIDE_WEB_AUTH_TYPE
          valueFrom:
            configMapKeyRef:
              name: web-auth-mode
              key: mode
    asserts:
      - isKind:
          of: Secret
