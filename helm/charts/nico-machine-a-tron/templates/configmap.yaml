{{- $root := . }}
{{- $namespace := include "nico-machine-a-tron.namespace" . }}
{{- $baseName := include "nico-machine-a-tron.name" . }}

{{/*
Count active pods and build ordered list for consistent pod indexing
*/}}
{{- $activePods := 0 }}
{{- $podList := list }}
{{- range $podName, $podConfig := .Values.pods }}
{{- if $root.Values.bmcServices.enabled }}
{{- if $podConfig.cidr }}
{{- $activePods = add $activePods 1 }}
{{- $podList = append $podList $podName }}
{{- end }}
{{- else }}
{{- if $podConfig.machines }}
{{- $activePods = add $activePods 1 }}
{{- $podList = append $podList $podName }}
{{- end }}
{{- end }}
{{- end }}
{{- $podList = $podList | sortAlpha }}

{{/* Machine defaults */}}
{{- $defaults := .Values.machineDefaults | default dict }}
{{/* MAC address pool config */}}
{{- $macPool := .Values.macAddressPool | default dict }}
{{- $macPoolEnabled := true }}
{{- if hasKey $macPool "enabled" }}
{{- $macPoolEnabled = $macPool.enabled }}
{{- end }}
{{- $macBasePrefix := $macPool.basePrefix | default "02:00" }}
{{- $macHostBits := $macPool.hostBits | default 16 }}

{{/* HW MAC address ranges config */}}
{{- $hwMacRanges := .Values.hwMacAddressRanges | default dict }}
{{- $hwMacRangesEnabled := true }}
{{- if hasKey $hwMacRanges "enabled" }}
{{- $hwMacRangesEnabled = $hwMacRanges.enabled }}
{{- end }}
{{- $hwMacBasePrefix := $hwMacRanges.basePrefix | default "02:01" }}
{{- $hwMacHostBits := $hwMacRanges.hostBits | default 24 }}
{{- $hwMacRangeHostBits := $hwMacRanges.rangeHostBits | default 8 }}

{{- range $podName, $podConfig := .Values.pods }}
{{/*
Skip conditions (same as deployment.yaml)
*/}}
{{- if $root.Values.bmcServices.enabled }}
{{- if not $podConfig.cidr }}
{{- continue }}
{{- end }}
{{- else }}
{{- if not $podConfig.machines }}
{{- continue }}
{{- end }}
{{- end }}

{{/* Get pod index for MAC address pool */}}
{{- $podIndex := 0 }}
{{- range $i, $p := $podList }}
{{- if eq $p $podName }}
{{- $podIndex = $i }}
{{- end }}
{{- end }}

{{/* Validate pod index fits in single byte for MAC address */}}
{{- if ge $podIndex 256 }}
{{- fail (printf "Too many pods: pod index %d exceeds maximum 255 for MAC address generation" $podIndex) }}
{{- end }}

{{- $name := $baseName }}
{{- if gt $activePods 1 }}
{{- $name = printf "%s-%s" $baseName $podName }}
{{- end }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ $name }}-config-files
  namespace: {{ $namespace }}
  labels:
    {{- include "nico-machine-a-tron.labels" $root | nindent 4 }}
    {{- if gt $activePods 1 }}
    nvidia-infra-controller/pod-name: {{ $podName | quote }}
    {{- end }}
data:
  mat.toml: |
    {{- if and $root.Values.configFiles.matConfigs (index $root.Values.configFiles.matConfigs $podName) }}
    {{- index $root.Values.configFiles.matConfigs $podName | nindent 4 }}
    {{- else }}
    # Machine-A-Tron configuration - generated by Helm
    # Pod: {{ $podName }}
    {{- if $podConfig.cidr }}
    # CIDR: {{ $podConfig.cidr }}
    {{- end }}
    carbide_api_url = {{ $root.Values.machineATron.nicoApiUrl | quote }}
    interface = {{ $root.Values.machineATron.interface | quote }}
    tui_enabled = {{ $root.Values.machineATron.tuiEnabled }}
    {{- if $root.Values.machineATron.logFile }}
    log_file = {{ $root.Values.machineATron.logFile | quote }}
    {{- end }}
    bmc_mock_port = {{ $root.Values.service.bmcMock.port }}
    use_single_bmc_mock = {{ $root.Values.machineATron.useSingleBmcMock }}
    mock_bmc_ssh_server = {{ $root.Values.machineATron.mockBmcSshServer }}
    {{- if $root.Values.machineATron.mockBmcSshPort }}
    mock_bmc_ssh_port = {{ $root.Values.machineATron.mockBmcSshPort }}
    {{- end }}
    {{- if $root.Values.machineATron.configureBmcProxyHost }}
    configure_carbide_bmc_proxy_host = {{ $root.Values.machineATron.configureBmcProxyHost | quote }}
    {{- end }}
    {{- if $root.Values.persistence.enabled }}
    persist_dir = {{ $root.Values.machineATron.persistDir | quote }}
    {{- end }}
    cleanup_on_quit = {{ $root.Values.machineATron.cleanupOnQuit }}
    register_expected_machines = {{ $root.Values.machineATron.registerExpectedMachines }}
    {{- if $root.Values.machineATron.hostBmcPassword }}
    host_bmc_password = {{ $root.Values.machineATron.hostBmcPassword | quote }}
    {{- end }}
    {{- if $root.Values.machineATron.dpuBmcPassword }}
    dpu_bmc_password = {{ $root.Values.machineATron.dpuBmcPassword | quote }}
    {{- end }}
    api_refresh_interval = {{ $root.Values.machineATron.apiRefreshInterval | quote }}

    {{/*
    MAC Address Pool Configuration
    Each pod gets a unique base address: basePrefix:podIndex:00:00:00
    Example with basePrefix=02:00 and 3 pods:
      Pod 0: 02:00:00:00:00:00
      Pod 1: 02:00:01:00:00:00
      Pod 2: 02:00:02:00:00:00
    */}}
    {{- if $macPoolEnabled }}
    {{- $podMacPool := $podConfig.macAddressPool | default dict }}
    {{- if $podMacPool.base }}
    {{/* Explicit per-pod override */}}
    [mac_address_pool]
    base = {{ $podMacPool.base | quote }}
    host_bits = {{ $podMacPool.hostBits | default $macHostBits }}
    {{- else }}
    {{/* Auto-generate based on pod index */}}
    [mac_address_pool]
    base = "{{ $macBasePrefix }}:{{ printf "%02x" $podIndex }}:00:00:00"
    host_bits = {{ $macHostBits }}
    {{- end }}
    {{- end }}

    {{/*
    HW MAC Address Ranges - for network interface MAC blocks
    Format: basePrefix:podIndex:00:00:00
    Example with 3 pods:
      Pod 0: 02:01:00:00:00:00
      Pod 1: 02:01:01:00:00:00
      Pod 2: 02:01:02:00:00:00
    */}}
    {{- if $hwMacRangesEnabled }}
    {{- $podHwMacRanges := $podConfig.hwMacAddressRanges | default dict }}
    {{- if $podHwMacRanges.base }}
    {{/* Explicit per-pod override */}}
    [hw_mac_address_ranges]
    base = {{ $podHwMacRanges.base | quote }}
    host_bits = {{ $podHwMacRanges.hostBits | default $hwMacHostBits }}
    range_host_bits = {{ $podHwMacRanges.rangeHostBits | default $hwMacRangeHostBits }}
    {{- else }}
    {{/* Auto-generate based on pod index: 02:01:PP:00:00:00 */}}
    [hw_mac_address_ranges]
    base = "{{ $hwMacBasePrefix }}:{{ printf "%02x" $podIndex }}:00:00:00"
    host_bits = {{ $hwMacHostBits }}
    range_host_bits = {{ $hwMacRangeHostBits }}
    {{- end }}
    {{- end }}

    {{- range $sectionName, $section := $podConfig.machines }}
    {{- if $section }}

    [machines.{{ $sectionName }}]
    {{- if $section.hwType }}
    hw_type = {{ $section.hwType | quote }}
    {{- end }}
    host_count = {{ $section.hostCount | default 1 }}
    vpc_count = {{ $section.vpcCount | default $defaults.vpcCount | default 0 }}
    subnets_per_vpc = {{ $section.subnetsPerVpc | default $defaults.subnetsPerVpc | default 0 }}
    dpu_per_host_count = {{ $section.dpuPerHostCount | default 0 }}
    dpu_reboot_delay = {{ $section.dpuRebootDelay | default $defaults.dpuRebootDelay | default 1 }}
    host_reboot_delay = {{ $section.hostRebootDelay | default $defaults.hostRebootDelay | default 1 }}
    scout_run_interval = {{ $section.scoutRunInterval | default $defaults.scoutRunInterval | default "60s" | quote }}
    run_interval_working = {{ $section.runIntervalWorking | default $defaults.runIntervalWorking | default "1s" | quote }}
    run_interval_idle = {{ $section.runIntervalIdle | default $defaults.runIntervalIdle | default "10s" | quote }}
    network_status_run_interval = {{ $section.networkStatusRunInterval | default $defaults.networkStatusRunInterval | default "20s" | quote }}
    oob_dhcp_relay_address = {{ $section.oobDhcpRelayAddress | default "192.168.192.1" | quote }}
    admin_dhcp_relay_address = {{ $section.adminDhcpRelayAddress | default "192.168.176.1" | quote }}
    {{- $nvType := $section.networkVirtualizationType | default $defaults.networkVirtualizationType }}
    {{- if $nvType }}
    network_virtualization_type = {{ $nvType | quote }}
    {{- end }}
    dpus_in_nic_mode = {{ $section.dpusInNicMode | default $defaults.dpusInNicMode | default false }}
    {{- end }}
    {{- end }}
    {{- end }}
{{- end }}
